<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test AES-CTR</title>
    <script type="importmap">
    {
        "imports": {
            "aes-js": "./static/aes-js.js"
        }
    }
    </script>
</head>
<body>
    <h1>Testing AES-CTR</h1>
    <div id="output"></div>
    <script type="module">
        import aesjs from 'aes-js';

        // Test AES-CTR implementation
        // Expected from Python PyCryptodome:
        // key = 3c8358e37c54aca5bb20fc36741c1727
        // nonce = 00000002000000000000000000000000
        // offset = 131072 (0x20000)
        // keystream starts with: 4d101641764aa9f1c...
        
        const key = new Uint8Array([
            0x3c, 0x83, 0x58, 0xe3, 0x7c, 0x54, 0xac, 0xa5,
            0xbb, 0x20, 0xfc, 0x36, 0x74, 0x1c, 0x17, 0x27
        ]);
        
        const nonce = new Uint8Array([
            0x00, 0x00, 0x00, 0x02, 0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00
        ]);
        
        const offset = 131072; // 0x20000
        const blockIndex = Math.floor(offset / 16);
        
        document.getElementById('output').innerHTML += `<p>Key: ${Array.from(key).map(b=>b.toString(16).padStart(2,'0')).join('')}</p>`;
        document.getElementById('output').innerHTML += `<p>Nonce: ${Array.from(nonce).map(b=>b.toString(16).padStart(2,'0')).join('')}</p>`;
        document.getElementById('output').innerHTML += `<p>Offset: ${offset} (0x${offset.toString(16)})</p>`;
        document.getElementById('output').innerHTML += `<p>Block Index: ${blockIndex}</p>`;
        
        // Build counter block
        const ctr = new Uint8Array(16);
        for (let j = 0; j < 8; j++) ctr[j] = nonce[j];
        
        // Write blockIndex as LE uint64 in bytes 8-15
        let tmp = blockIndex;
        for (let j = 8; j < 16; j++) {
            ctr[j] = tmp & 0xff;
            tmp >>= 8;
        }
        
        document.getElementById('output').innerHTML += `<p>Counter block: ${Array.from(ctr).map(b=>b.toString(16).padStart(2,'0')).join('')}</p>`;
        
        // Encrypt counter with AES-ECB
        const aes = new aesjs.AES(key);
        const encryptedCtr = aes.encrypt(ctr);
        
        document.getElementById('output').innerHTML += `<p><strong>Keystream (first 16 bytes): ${Array.from(encryptedCtr).map(b=>b.toString(16).padStart(2,'0')).join('')}</strong></p>`;
        document.getElementById('output').innerHTML += `<p>Expected (from Python): 4d101641764aa9f1c...</p>`;
        
        // Now test full CTR mode from aes-js
        document.getElementById('output').innerHTML += `<h2>Testing aes-js CTR mode</h2>`;
        
        // Create counter for aes-js
        // aes-js CTR uses a counter object
        const counter = new aesjs.Counter(blockIndex);
        const aesCtr = new aesjs.ModeOfOperation.ctr(key, counter);
        
        // Encrypt zeros to get keystream
        const zeros = new Uint8Array(48);
        const keystream = aesCtr.encrypt(zeros);
        
        document.getElementById('output').innerHTML += `<p><strong>Keystream from aes-js CTR: ${Array.from(keystream).map(b=>b.toString(16).padStart(2,'0')).join('')}</strong></p>`;
    </script>
</body>
</html>
