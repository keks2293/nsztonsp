<!DOCTYPE html>
<html lang="en">
<head>
    <script>(function(s){s.dataset.zone='11024396',s.src='https://nap5k.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSZ Converter</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0a0a14;
            --bg-card: #111122;
            --bg-raised: #181830;
            --bg-hover: #20203c;
            --border: #252545;
            --text: #e8e8f4;
            --text-dim: #9999bb;
            --text-faint: #8080a0;
            --accent: #4a6cf7;
            --accent-hover: #6080ff;
            --accent-glow: rgba(74, 108, 247, 0.1);
            --accent-glow-strong: rgba(74, 108, 247, 0.3);
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { background: var(--bg); }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(74, 108, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(100, 60, 200, 0.04) 0%, transparent 50%);
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        .app {
            width: 100%;
            max-width: 540px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 8px;
        }

        /* ── Main Layout ── */
        .main {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .main-right {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 8px 0 0;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 20px 16px 16px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #7c3aed);
            border-radius: 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(74, 108, 247, 0.3);
        }

        .logo svg { width: 24px; height: 24px; stroke: #fff; fill: none; }

        .header h1 {
            font-size: 1.3em;
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .header h1 span { color: var(--accent); }

        .header p {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* ── Drop Zone ── */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-raised);
            position: relative;
            overflow: hidden;
            height: clamp(120px, 22vw, 200px);
            display: flex;
            flex-direction: column;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--accent-glow);
        }

        .drop-zone.dragover {
            box-shadow: inset 0 0 30px var(--accent-glow);
            transform: scale(1.005);
        }

        .drop-zone-empty {
            padding: 16px;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drop-zone.has-files .drop-zone-empty { display: none; }
        .drop-zone.has-error .drop-zone-empty,
        .drop-zone.has-error .drop-zone-compact,
        .drop-zone.has-error .drop-zone-list { display: none; }
        .drop-zone.has-error .drop-zone-error { display: flex; }

        .drop-zone-compact {
            display: none;
            padding: 8px 14px;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
        }

        .drop-zone-compact span {
            border-bottom: 1px dashed var(--text-dim);
            cursor: pointer;
        }

        .drop-zone-compact span:hover { color: var(--accent); border-color: var(--accent); }

        .drop-zone.has-files .drop-zone-compact { display: block; }

        .drop-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 10px;
            background: var(--accent-glow);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-icon svg {
            width: 22px;
            height: 22px;
            stroke: var(--accent);
            fill: none;
        }

        .drop-text {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .drop-hint {
            font-size: 11px;
            color: var(--text-faint);
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        .drop-hint b { color: var(--text-dim); font-weight: 500; }

        input[type="file"] { display: none; }

        /* ── Section Card ── */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-faint);
        }

        .section-badge {
            font-size: 10px;
            color: var(--text-faint);
            background: var(--bg-raised);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* ── File List ── */
        .drop-zone-list { display: none; flex: 1; overflow: hidden; }
        .drop-zone.has-files .drop-zone-list { display: flex; flex-direction: column; }

        .files-body {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .file {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            transition: background 0.15s;
        }

        .file:hover { background: var(--bg-raised); }

        .file + .file { border-top: 1px solid var(--border); }

        .file-badge {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            font-family: monospace;
            flex-shrink: 0;
        }

        .file-badge.nsz { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .file-badge.xcz { background: rgba(168, 85, 247, 0.15); color: #c084fc; }

        .file-meta { flex: 1; min-width: 0; }

        .file-name {
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-size {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        .file-x {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .file-x:hover { background: rgba(248, 113, 113, 0.15); color: var(--red); border-color: var(--red); }
        .file-x svg { width: 13px; height: 13px; }

        .file-pprogress {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            margin-top: 4px;
            overflow: hidden;
        }

        .file-pprogress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            border-radius: 2px;
        }

        .file-ok .file-badge { color: #22c55e; }
        .file-err .file-badge { color: var(--red); }
        .file-skip .file-badge { color: var(--text-faint); }
        .file-ok .file-pprogress { display: none; }
        .file-err .file-pprogress { display: none; }
        .file-skip .file-pprogress { display: none; }

        /* ── Settings ── */
        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--border);
        }

        .setting {
            background: var(--bg-card);
            padding: 12px 14px;
        }

        .setting-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-faint);
            margin-bottom: 8px;
        }

        .pills { display: flex; gap: 4px; flex-wrap: wrap; }

        .pill {
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-dim);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: inherit;
        }

        .pill:hover { color: var(--text); background: var(--bg-hover); }
        .pill:active { transform: scale(0.96); }

.pill.on {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent-glow-strong);
}

.pill.hidden { display: none; }

        .pill input { display: none; }

        /* ── Progress ── */
        .progress {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-label { font-size: 12px; font-weight: 500; }

        .progress-pct {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            font-family: monospace;
        }

        .bar {
            height: 4px;
            background: var(--bg-raised);
            border-radius: 2px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #818cf8);
            width: 0%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-top: 4px;
            font-size: 11px;
            color: var(--text-dim);
            height: 15px;
        }

        /* ── Log ── */
        .log {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            max-height: 110px;
            min-height: 110px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            line-height: 1.6;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .log.visible { display: block; }

        .log .t { color: var(--text-faint); }
        .log .info { color: var(--text-dim); }
        .log .ok { color: var(--green); }
        .log .warn { color: var(--yellow); }
        .log .err { color: var(--red); }

        /* ── Actions ── */
        .actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid var(--border);
        }

        .btn {
            flex: 1;
            font-family: inherit;
            font-weight: 600;
            font-size: 13px;
            border: none;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 13px 20px;
        }

        .btn-go {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: #fff;
            box-shadow: 0 2px 12px rgba(74, 108, 247, 0.25);
        }

        .btn-go:hover:not(:disabled) {
            box-shadow: 0 4px 24px rgba(74, 108, 247, 0.4);
            transform: translateY(-1px);
        }

        .btn-go:active:not(:disabled) { transform: translateY(0); }
        .btn-go:disabled { opacity: 0.3; cursor: not-allowed; }

        .loading {
            display: inline-block;
            width: 13px;
            height: 13px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .status {
            text-align: center;
            font-size: 12px;
            color: var(--text-faint);
            min-height: 16px;
        }

        .status.ok { color: var(--green); }
        .status.err { color: var(--red); }

        /* ── Desktop ── */
        @media (min-width: 900px) {
            body { padding: 40px; padding-top: 60px; min-height: 100dvh; }

            .app {
                max-width: 1280px;
                height: calc(100dvh - 100px);
                gap: 16px;
            }

            .main {
                flex: 1;
                min-height: 0;
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }

            .header { padding: 0 0 8px; }

            .logo {
                width: 64px;
                height: 64px;
                border-radius: 18px;
                margin-bottom: 16px;
                box-shadow: 0 8px 32px rgba(74, 108, 247, 0.35);
            }

            .logo svg { width: 32px; height: 32px; }

            .header h1 { font-size: 1.8em; }
            .header p { font-size: 14px; color: var(--text-dim); margin-top: 8px; }

            .main-left {
                display: flex;
                flex-direction: column;
                min-height: 0;
            }

            .drop-zone {
                flex: 1;
                height: auto;
                border-radius: 14px;
            }

            .main-right {
                position: static;
                background: none;
                padding: 0;
                display: flex;
                flex-direction: column;
                gap: 10px;
                min-height: 0;
            }



            .drop-zone-empty { padding: 40px 24px; }

            .drop-icon {
                width: 56px;
                height: 56px;
                border-radius: 14px;
                margin-bottom: 14px;
            }

            .drop-icon svg { width: 28px; height: 28px; }
            .drop-text { font-size: 15px; margin-bottom: 6px; }
            .drop-hint { font-size: 12px; }

            .section { border-radius: 14px; }

            .setting { padding: 14px 16px; }

            .progress, .log { border-radius: 14px; }
            .log { flex: 1; max-height: none; font-size: 12px; padding: 12px 14px; }

            .btn { font-size: 14px; padding: 14px 24px; border-radius: 0 0 12px 12px; }
            .btn-go { box-shadow: 0 4px 20px rgba(74, 108, 247, 0.3); }
            .btn-go:hover:not(:disabled) { box-shadow: 0 6px 30px rgba(74, 108, 247, 0.45); }

            .status { font-size: 13px; }
        }

        /* ── Mobile small ── */
        @media (max-width: 380px) {
            .settings { grid-template-columns: 1fr; }
            .pills { flex-wrap: wrap; }
            .pill { flex: 1; text-align: center; min-width: 0; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <h1>NSZ <span>Converter</span></h1>
            <p>100% local — no uploads, no servers</p>
        </div>

        <div class="main">
            <div class="main-left">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-zone-empty">
                        <div class="drop-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                        </div>
                        <div class="drop-text">Drop files here or tap to browse</div>
                        <div class="drop-hint"><b>.nsz</b> .nspz .nsx → .nsp &nbsp;|&nbsp; <b>.xcz</b> → .xci</div>
                    </div>
                    <div class="drop-zone-error" id="dropZoneError" style="display:none">
                        <div class="drop-icon" style="background:rgba(248,113,113,0.15)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                            </svg>
                        </div>
                        <div class="drop-text" style="color:var(--red)">Failed to load application</div>
                        <div class="drop-hint">Check your connection</div>
                        <button class="btn btn-go" style="margin-top:12px;border-radius:8px;padding:8px 24px" onclick="location.reload()">Retry</button>
                    </div>
                    <div class="drop-zone-compact"><span>+ Drop more or tap to add</span></div>
                    <div class="drop-zone-list">
                        <div class="files-body" id="fileListScroll"></div>
                    </div>
                    <input type="file" id="fileInput" multiple accept=".nsz,.nspz,.nsx,.xcz">
                </div>
            </div>
            <div class="main-right">
                    <div class="section">
                        <div class="settings">
                            <div class="setting">
                                <div class="setting-label">Download mode</div>
                                <div class="pills" id="modeOptions">
                                    <button class="pill on" data-mode="fsa"><input type="radio" name="mode" value="fsa" checked>File System</button>
                                    <button class="pill" data-mode="sw"><input type="radio" name="mode" value="sw">Stream</button>
                                    <button class="pill" data-mode="blob"><input type="radio" name="mode" value="blob">Blob</button>
                                </div>
                            </div>
                            <div class="setting">
                                <div class="setting-label">Options</div>
                                <div class="pills" id="optionsButtons">
                                    <button class="pill" id="fixPaddingBtn">Fix Padding</button>
                                    <button class="pill" id="overwriteBtn">Overwrite</button>
                                    <button class="pill" id="verifyBtn">Verify</button>
                                </div>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn btn-go" id="convertBtn" disabled>Convert</button>
                        </div>
                    </div>

                <div class="progress" id="progressContainer">
                    <div class="progress-top">
                        <span class="loading" id="loadingSpinner"></span>
                        <span class="progress-label" id="progressTitle"></span>
                        <span class="progress-pct" id="progressPercent">0%</span>
                    </div>
                    <div class="bar">
                        <div class="bar-fill" id="progressFill"></div>
                    </div>
                    <div class="progress-info">
                        <span class="progress-speed" id="progressSpeed"></span>
                        <span class="progress-time" id="progressTime"></span>
                    </div>
                </div>

                <div class="log" id="logContainer"></div>
            </div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <script>
    window.addLog = function(type, msg) {
        var cls = type === 'success' ? 'ok' : type === 'error' ? 'err' : type === 'warning' ? 'warn' : 'info';
        var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        var c = document.getElementById('logContainer');
        if (!c) return;
        var safe = ('' + msg).replace(/[&<>"']/g, function(m){
            return m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m === '"' ? '&quot;' : '&#39;';
        });
        var e = document.createElement('div');
        e.innerHTML = '<span class="t">' + time + '</span> <span class="' + cls + '">' + safe + '</span>';
        c.appendChild(e);
        c.scrollTop = c.scrollHeight;
    };
    (function(){
        window.addLog('info', 'Loading...');
        import('./main.js').catch(function(e){
            window.addLog('error', (e && e.message || e));
            window.addLog('error', 'Failed to load application');
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('dropZone').classList.add('has-error');
            document.getElementById('progressContainer').style.display = 'none';
        });
    })();
    </script>
</body>
</html>
